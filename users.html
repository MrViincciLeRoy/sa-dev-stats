<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SA Dev Stats — Developers</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --card: #111820;
    --card-hover: #151f2a;
    --border: #1e2d3d;
    --accent: #00e5a0;
    --accent2: #0af;
    --accent3: #f05a7e;
    --text: #c9d1d9;
    --muted: #5a7080;
    --heading: #e6edf3;
    --font-mono: 'Space Mono', monospace;
    --font-sans: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 24px 64px; }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 20px 0 0;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
  }
  nav a {
    color: var(--muted);
    text-decoration: none;
    padding: 6px 14px;
    border: 1px solid transparent;
    border-radius: 20px;
    transition: all .2s;
  }
  nav a:hover { color: var(--accent); border-color: var(--border); }
  nav a.active { color: var(--accent); border-color: var(--accent); }
  nav .sep { color: var(--border); }

  header {
    padding: 32px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  h1 {
    font-family: var(--font-sans);
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 800;
    color: var(--heading);
    line-height: 1;
    letter-spacing: -.02em;
  }
  h1 span { color: var(--accent); }
  .meta-pill {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .meta-pill span { color: var(--accent); }

  /* CONTROLS */
  .controls {
    display: grid;
    grid-template-columns: 1fr auto auto auto auto;
    gap: 12px;
    margin-bottom: 24px;
    align-items: center;
  }
  @media (max-width: 800px) {
    .controls { grid-template-columns: 1fr 1fr; }
    .controls .search-wrap { grid-column: 1 / -1; }
  }

  .search-wrap {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 13px;
    pointer-events: none;
  }
  input[type="text"], select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 14px;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }
  input[type="text"] { padding-left: 36px; }
  input[type="text"]:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--card); }

  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 10px 16px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-clear:hover { border-color: var(--accent3); color: var(--accent3); }

  /* RESULTS BAR */
  .results-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }
  .results-bar strong { color: var(--accent); }

  /* GRID */
  .dev-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* CARD */
  .dev-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: border-color .2s, background .2s, transform .15s;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    display: block;
  }
  .dev-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0;
    transition: opacity .2s;
  }
  .dev-card:hover { border-color: #2a3f50; background: var(--card-hover); transform: translateY(-2px); }
  .dev-card:hover::before { opacity: 1; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }
  .card-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    overflow: hidden;
  }
  .card-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(0,229,160,.08);
  }
  .card-identity { flex: 1; min-width: 0; }
  .card-name {
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 600;
    color: var(--heading);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .card-login {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
  }
  .gender-badge {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .gender-male    { background: rgba(0,170,255,.1); color: var(--accent2); border: 1px solid rgba(0,170,255,.2); }
  .gender-female  { background: rgba(240,90,126,.1); color: var(--accent3); border: 1px solid rgba(240,90,126,.2); }
  .gender-unknown { background: rgba(90,112,128,.1); color: var(--muted); border: 1px solid rgba(90,112,128,.2); }

  .card-location {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-bio {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    opacity: .8;
  }

  .card-langs {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 14px;
  }
  .lang-tag {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .08em;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(0,229,160,.07);
    color: var(--accent);
    border: 1px solid rgba(0,229,160,.15);
  }

  .card-stats {
    display: flex;
    gap: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-val {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--heading);
  }
  .stat-lbl {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8,12,16,.85);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    padding: 24px 24px 0;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    position: relative;
  }
  .modal-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid var(--border);
    overflow: hidden;
    flex-shrink: 0;
    background: var(--surface);
  }
  .modal-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .modal-avatar-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(0,229,160,.08);
  }
  .modal-identity { flex: 1; }
  .modal-name {
    font-family: var(--font-sans);
    font-size: 20px;
    font-weight: 800;
    color: var(--heading);
    margin-bottom: 4px;
  }
  .modal-login {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 18px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
    line-height: 1;
  }
  .modal-close:hover { border-color: var(--accent3); color: var(--accent3); }

  .modal-body { padding: 20px 24px 24px; }

  .modal-section { margin-bottom: 20px; }
  .modal-section-title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .modal-stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .modal-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .modal-stat-val {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--heading);
    margin-bottom: 4px;
  }
  .modal-stat-lbl {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .modal-bio {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }

  .modal-langs { display: flex; flex-wrap: wrap; gap: 6px; }
  .modal-lang-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 6px;
    background: rgba(0,229,160,.07);
    color: var(--accent);
    border: 1px solid rgba(0,229,160,.15);
  }
  .modal-lang-tag span {
    color: var(--muted);
    margin-left: 4px;
  }

  .modal-meta {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .modal-meta-row {
    display: flex;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .modal-meta-key { color: var(--muted); width: 100px; flex-shrink: 0; }
  .modal-meta-val { color: var(--text); }

  .btn-github {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 12px;
    background: rgba(0,229,160,.08);
    border: 1px solid rgba(0,229,160,.3);
    border-radius: 8px;
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: .1em;
    text-transform: uppercase;
    text-decoration: none;
    transition: all .2s;
    margin-top: 4px;
  }
  .btn-github:hover { background: rgba(0,229,160,.15); border-color: var(--accent); }

  /* PAGINATION */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 40px;
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .page-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 14px;
    cursor: pointer;
    transition: all .2s;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .page-btn:disabled { opacity: .3; cursor: default; }
  .page-btn.active { background: rgba(0,229,160,.1); border-color: var(--accent); color: var(--accent); }
  .page-info { color: var(--muted); padding: 0 8px; }

  /* EMPTY / LOADING */
  .state-msg {
    text-align: center;
    padding: 80px 0;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--muted);
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: inline-block;
    margin-right: 10px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    border-top: 1px solid var(--border);
    margin-top: 60px;
    padding-top: 24px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">

  <nav>
    <a href="index.html">Dashboard</a>
    <span class="sep">/</span>
    <a href="users.html" class="active">Developers</a>
  </nav>

  <header>
    <div>
      <div class="eyebrow">// developers.json · live</div>
      <h1>SA <span>Developers</span></h1>
    </div>
    <div class="meta-pill">Total loaded: <span id="total-count">—</span></div>
  </header>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search username, name, bio, location…" />
    </div>
    <select id="filter-lang">
      <option value="">All Languages</option>
    </select>
    <select id="filter-gender">
      <option value="">All Genders</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="unknown">Unknown</option>
    </select>
    <select id="sort-by">
      <option value="followers">Sort: Followers</option>
      <option value="public_repos">Sort: Repos</option>
      <option value="created_at_asc">Sort: Oldest</option>
      <option value="created_at_desc">Sort: Newest</option>
      <option value="login">Sort: Username</option>
    </select>
    <button class="btn-clear" onclick="clearFilters()">Clear</button>
  </div>

  <div class="results-bar">
    <div>Showing <strong id="shown-count">0</strong> of <strong id="total-shown">0</strong> developers</div>
    <div id="page-indicator" style="color:var(--muted)"></div>
  </div>

  <div id="loading" class="state-msg"><span class="spinner"></span> Loading developers.json…</div>
  <div id="error" class="state-msg" style="display:none;color:var(--accent3)"></div>
  <div id="dev-grid" class="dev-grid" style="display:none"></div>
  <div class="pagination" id="pagination"></div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal" id="modal-content"></div>
  </div>

  <footer>
    <span>SA Dev Stats · Public GitHub data only</span>
    <span><a href="index.html">← Back to Dashboard</a></span>
  </footer>

</div>

<script>
const PER_PAGE = 30;
let allDevs = [];
let filtered = [];
let currentPage = 1;

async function loadDevs() {
  try {
    const res = await fetch('data/developers.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allDevs = await res.json();
    document.getElementById('total-count').textContent = allDevs.length.toLocaleString();
    buildLangFilter();
    applyFilters();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dev-grid').style.display = 'grid';
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.style.display = 'block';
    el.textContent = `Could not load data/developers.json — ${err.message}`;
  }
}

function buildLangFilter() {
  const langCount = {};
  allDevs.forEach(d => {
    Object.keys(d.languages || {}).forEach(l => { langCount[l] = (langCount[l] || 0) + 1; });
  });
  const sorted = Object.entries(langCount).sort((a,b) => b[1]-a[1]).slice(0, 30);
  const sel = document.getElementById('filter-lang');
  sorted.forEach(([lang]) => {
    const opt = document.createElement('option');
    opt.value = lang;
    opt.textContent = lang;
    sel.appendChild(opt);
  });
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const lang = document.getElementById('filter-lang').value;
  const gender = document.getElementById('filter-gender').value;
  const sort = document.getElementById('sort-by').value;

  filtered = allDevs.filter(d => {
    if (lang && !Object.keys(d.languages || {}).includes(lang)) return false;
    if (gender && d.gender !== gender) return false;
    if (q) {
      const hay = [d.login, d.name, d.bio, d.location].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    if (sort === 'followers')      return (b.followers || 0) - (a.followers || 0);
    if (sort === 'public_repos')   return (b.public_repos || 0) - (a.public_repos || 0);
    if (sort === 'created_at_asc') return new Date(a.created_at) - new Date(b.created_at);
    if (sort === 'created_at_desc')return new Date(b.created_at) - new Date(a.created_at);
    if (sort === 'login')          return (a.login || '').localeCompare(b.login || '');
    return 0;
  });

  currentPage = 1;
  render();
}

function render() {
  const grid = document.getElementById('dev-grid');
  const start = (currentPage - 1) * PER_PAGE;
  const page  = filtered.slice(start, start + PER_PAGE);

  document.getElementById('shown-count').textContent = page.length.toLocaleString();
  document.getElementById('total-shown').textContent = filtered.length.toLocaleString();

  grid.innerHTML = '';
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="state-msg" style="grid-column:1/-1">No developers match your filters.</div>';
  } else {
    page.forEach(dev => grid.appendChild(makeCard(dev)));
  }

  renderPagination();
}

function makeCard(dev) {
  const card = document.createElement('div');
  card.className = 'dev-card';
  card.onclick = () => openModal(dev);

  const langs = Object.entries(dev.languages || {})
    .sort((a,b) => b[1]-a[1])
    .slice(0, 4)
    .map(([l]) => `<span class="lang-tag">${l}</span>`)
    .join('');

  const initials = (dev.name || dev.login || '?').slice(0,2).toUpperCase();
  const avatarUrl = `https://avatars.githubusercontent.com/${dev.login}?s=80`;

  card.innerHTML = `
    <div class="card-top">
      <div class="card-avatar">
        <img src="${avatarUrl}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\"avatar-placeholder\\">${initials}</div>'" />
      </div>
      <div class="card-identity">
        <div class="card-name">${dev.name || dev.login}</div>
        <div class="card-login">@${dev.login}</div>
      </div>
      <div class="gender-badge gender-${dev.gender || 'unknown'}">${dev.gender || '?'}</div>
    </div>
    ${dev.location ? `<div class="card-location">📍 ${dev.location}</div>` : ''}
    ${dev.bio ? `<div class="card-bio">${escHtml(dev.bio)}</div>` : ''}
    ${langs ? `<div class="card-langs">${langs}</div>` : ''}
    <div class="card-stats">
      <div class="stat-item"><div class="stat-val">${fmt(dev.followers)}</div><div class="stat-lbl">Followers</div></div>
      <div class="stat-item"><div class="stat-val">${fmt(dev.public_repos)}</div><div class="stat-lbl">Repos</div></div>
      <div class="stat-item"><div class="stat-val">${accountAge(dev.created_at)}</div><div class="stat-lbl">Tenure</div></div>
    </div>
  `;
  return card;
}

function openModal(dev) {
  const initials = (dev.name || dev.login || '?').slice(0,2).toUpperCase();
  const avatarUrl = `https://avatars.githubusercontent.com/${dev.login}?s=120`;

  const langs = Object.entries(dev.languages || {})
    .sort((a,b) => b[1]-a[1])
    .map(([l, c]) => `<span class="modal-lang-tag">${l}<span>×${c}</span></span>`)
    .join('');

  const joinedDate = dev.created_at
    ? new Date(dev.created_at).toLocaleDateString('en-ZA', { year:'numeric', month:'long', day:'numeric' })
    : 'Unknown';

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-header">
      <div class="modal-avatar">
        <img src="${avatarUrl}" alt="" onerror="this.parentElement.innerHTML='<div class=\\"modal-avatar-placeholder\\">${initials}</div>'" />
      </div>
      <div class="modal-identity">
        <div class="modal-name">${dev.name || dev.login}</div>
        <div class="modal-login">@${dev.login}</div>
        ${dev.location ? `<div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">📍 ${dev.location}</div>` : ''}
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">

      <div class="modal-section">
        <div class="modal-section-title">Stats</div>
        <div class="modal-stats-grid">
          <div class="modal-stat"><div class="modal-stat-val" style="color:var(--accent2)">${fmt(dev.followers)}</div><div class="modal-stat-lbl">Followers</div></div>
          <div class="modal-stat"><div class="modal-stat-val">${fmt(dev.public_repos)}</div><div class="modal-stat-lbl">Repos</div></div>
          <div class="modal-stat"><div class="modal-stat-val">${fmt(dev.following)}</div><div class="modal-stat-lbl">Following</div></div>
        </div>
      </div>

      ${dev.bio ? `
      <div class="modal-section">
        <div class="modal-section-title">Bio</div>
        <div class="modal-bio">${escHtml(dev.bio)}</div>
      </div>` : ''}

      ${langs ? `
      <div class="modal-section">
        <div class="modal-section-title">Languages</div>
        <div class="modal-langs">${langs}</div>
      </div>` : ''}

      <div class="modal-section">
        <div class="modal-section-title">Info</div>
        <div class="modal-meta">
          <div class="modal-meta-row"><span class="modal-meta-key">Gender</span><span class="modal-meta-val">${dev.gender || 'unknown'}</span></div>
          <div class="modal-meta-row"><span class="modal-meta-key">Joined GitHub</span><span class="modal-meta-val">${joinedDate}</span></div>
          <div class="modal-meta-row"><span class="modal-meta-key">Tenure</span><span class="modal-meta-val">${accountAge(dev.created_at)}</span></div>
          <div class="modal-meta-row"><span class="modal-meta-key">Scraped</span><span class="modal-meta-val">${dev.scraped_at ? new Date(dev.scraped_at).toLocaleDateString('en-ZA') : '—'}</span></div>
        </div>
      </div>

      <a class="btn-github" href="https://github.com/${dev.login}" target="_blank" rel="noopener">
        ↗ View GitHub Profile
      </a>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  const pag = document.getElementById('pagination');
  pag.innerHTML = '';
  if (total <= 1) return;

  document.getElementById('page-indicator').textContent = `Page ${currentPage} of ${total}`;

  const prev = document.createElement('button');
  prev.className = 'page-btn';
  prev.textContent = '← Prev';
  prev.disabled = currentPage === 1;
  prev.onclick = () => { currentPage--; render(); window.scrollTo(0,0); };
  pag.appendChild(prev);

  const range = pageRange(currentPage, total);
  range.forEach(p => {
    if (p === '…') {
      const span = document.createElement('span');
      span.className = 'page-info';
      span.textContent = '…';
      pag.appendChild(span);
    } else {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (p === currentPage ? ' active' : '');
      btn.textContent = p;
      btn.onclick = () => { currentPage = p; render(); window.scrollTo(0,0); };
      pag.appendChild(btn);
    }
  });

  const next = document.createElement('button');
  next.className = 'page-btn';
  next.textContent = 'Next →';
  next.disabled = currentPage === total;
  next.onclick = () => { currentPage++; render(); window.scrollTo(0,0); };
  pag.appendChild(next);
}

function pageRange(cur, total) {
  if (total <= 7) return Array.from({length: total}, (_, i) => i + 1);
  const pages = [];
  pages.push(1);
  if (cur > 3) pages.push('…');
  for (let i = Math.max(2, cur-1); i <= Math.min(total-1, cur+1); i++) pages.push(i);
  if (cur < total - 2) pages.push('…');
  pages.push(total);
  return pages;
}

function clearFilters() {
  document.getElementById('search').value = '';
  document.getElementById('filter-lang').value = '';
  document.getElementById('filter-gender').value = '';
  document.getElementById('sort-by').value = 'followers';
  applyFilters();
}

function fmt(n) {
  if (!n && n !== 0) return '—';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toString();
}

function accountAge(created_at) {
  if (!created_at) return '—';
  const years = ((Date.now() - new Date(created_at)) / (1000*60*60*24*365)).toFixed(1);
  return years + 'y';
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// debounce search
let searchTimer;
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 250);
});
document.getElementById('filter-lang').addEventListener('change', applyFilters);
document.getElementById('filter-gender').addEventListener('change', applyFilters);
document.getElementById('sort-by').addEventListener('change', applyFilters);

loadDevs();
</script>
